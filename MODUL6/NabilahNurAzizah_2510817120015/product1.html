    <style>
        .corner-bracket {
            position: fixed;
            width: 40px;
            height: 40px;
            border-color: #000000;
            border-style: solid;
            z-index: 9999;
        }
        
        .corner-top-left { top: 20px; left: 20px; border-width: 8px 0 0 8px; }
        .corner-top-right { top: 20px; right: 20px; border-width: 8px 8px 0 0; }
        .corner-bottom-left { bottom: 20px; left: 20px; border-width: 0 0 8px 8px; }
        .corner-bottom-right { bottom: 20px; right: 20px; border-width: 0 8px 8px 0; }
        
        body {
            padding: 40px 20px;
        }
        
        .youtube-link {
            transition: transform 0.3s ease, filter 0.3s ease;
            display: inline-block;
        }
        .youtube-link img {
            aspect-ratio: 3 / 2;
            object-fit: cover;
            width: 100%;
        }
        .youtube-link:hover {
            transform: scale(1.02);
            filter: brightness(0.8);
        }
    </style>
</head>
